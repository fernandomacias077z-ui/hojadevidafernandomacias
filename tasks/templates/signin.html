{% extends 'base.html' %}
{% block content %}
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <form method="POST" class="p-4 rounded-3 border border-info" style="background: rgba(15,15,25,0.8);">
                <h2 class="text-center text-info mb-4">AUTH_LOGIN</h2>
                {% csrf_token %}
                <input type="text" name="username" class="form-control bg-dark text-white border-secondary mb-3" placeholder="Username">
                <input type="password" name="password" class="form-control bg-dark text-white border-secondary mb-3" placeholder="Password">
                <button class="btn btn-info w-100 fw-bold">EXECUTE_LOGIN</button>
            </form>
        </div>
    </div>
</main>
{% endblock %}
