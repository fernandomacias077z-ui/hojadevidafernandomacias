{% extends 'base.html' %}
{% block content %}
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="p-4 rounded-3 shadow" style="background: rgba(15,15,25,0.8); border: 1px solid var(--neon-cyan);">
                <h1 class="mb-4 text-info font-monospace">_CREATE_TASK</h1>
                <form method="POST">
                    {% csrf_token %}
                    {{form.as_p}}
                    <button class="btn btn-info w-100 py-2 mt-3 fw-bold">SAVE_PROCESS</button>
                </form>
            </div>
        </div>
    </div>
</main>
<style>
    input, textarea { background: #000 !important; color: #fff !important; border: 1px solid #333 !important; width: 100%; border-radius: 4px; padding: 10px; }
    label { color: #00f2ff; font-size: 0.8rem; text-transform: uppercase; }
</style>
{% endblock %}
