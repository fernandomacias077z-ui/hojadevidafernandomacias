{% extends 'base.html' %}
{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="text-center p-5 rounded-4" style="background: rgba(15,15,25,0.8); border: 1px solid rgba(0,242,255,0.2); max-width: 700px;">
        <h1 class="display-3 fw-bold text-info mb-4">DEV_SYSTEM</h1>
        <p class="lead mb-5">Bienvenido Fernando. Regístrate o inicia sesión para acceder al panel de tareas y descargar mi Hoja de Vida profesional.</p>
        {% if not user.is_authenticated %}
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'signup' %}" class="btn btn-info px-5 py-3 fw-bold">CREATE_ID</a>
                <a href="{% url 'signin' %}" class="btn btn-outline-info px-5 py-3 fw-bold">AUTH_LOGIN</a>
            </div>
        {% else %}
            <a href="{% url 'profile_cv' %}" class="btn btn-info px-5 py-3 fw-bold">GO_TO_MY_CV</a>
        {% endif %}
    </div>
</div>
{% endblock %}
