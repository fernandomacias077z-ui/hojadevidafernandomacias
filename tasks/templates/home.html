{% extends 'base.html' %}

{% block content %}
<style>
    .hero-section {
        min-height: 60vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
    .main-title {
        font-size: clamp(2rem, 7vw, 4rem);
        font-weight: 800;
        color: var(--dark-dev);
        letter-spacing: -1px;
    }
    .accent-text { color: var(--dev-blue); }
    
    .mono { font-family: 'Fira Code', monospace; }

    .stat-card {
        background: white;
        border-radius: 15px;
        padding: 20px;
        border: 1px solid #e2e8f0;
        transition: transform 0.3s ease;
    }
    .stat-card:hover { transform: translateY(-5px); border-color: var(--dev-blue); }
</style>

<div class="hero-section animate-fade-in">
    <div class="mb-5">
        <h1 class="main-title mb-3">
            Construyendo el <span class="accent-text">Futuro</span> de la Tecnología.
        </h1>
        <p class="lead text-secondary mono mb-0">
            Estudiante de TI @ ULEAM
        </p>
    </div>

    <div class="row g-4 w-100" style="max-width: 800px;">
        <div class="col-md-4">
            <div class="stat-card shadow-sm">
                <h3 class="fw-bold mb-1" style="color: var(--dev-blue);">2+</h3>
                <p class="text-muted small mb-0 fw-bold">Años de Estudio</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card shadow-sm">
                <h3 class="fw-bold mb-1" style="color: var(--dev-blue);">1</h3>
                <p class="text-muted small mb-0 fw-bold">Curso Realizado</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card shadow-sm">
                <h3 class="fw-bold mb-1" style="color: var(--dev-blue);">1</h3>
                <p class="text-muted small mb-0 fw-bold">Proyecto Tech</p>
            </div>
        </div>
    </div>

    <div class="mt-5">
        <a href="{% url 'experiencia' %}" class="btn btn-dark btn-lg px-5 rounded-pill shadow-sm" style="background: var(--dark-dev);">
            Ver mi trayectoria <i class="bi bi-arrow-right ms-2"></i>
        </a>
    </div>
</div>
{% endblock %}
