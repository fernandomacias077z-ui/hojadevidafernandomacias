{% extends 'base.html' %}

{% block content %}
<style>
    /* 1. DEFINICIÓN DE VARIABLES (Iguales a tu Perfil para total coherencia) */
    :root {
        --bg-sitio: #ffffff;
        --bg-tarjeta: #f8fafc;
        --texto-principal: #0f172a;
        --texto-gris: #64748b;
        --cian: #00cae3;
        --borde: #e2e8f0;
    }

    /* MODO OSCURO MANUAL/SISTEMA */
    body.dark-mode {
        --bg-sitio: #0f172a;
        --bg-tarjeta: #1e293b;
        --texto-principal: #f8fafc;
        --texto-gris: #94a3b8;
        --borde: #334151;
    }

    /* 2. AJUSTE GLOBAL DEL BODY EN INICIO */
    body {
        background-color: var(--bg-sitio) !important;
        color: var(--texto-principal) !important;
        transition: all 0.3s ease;
    }

    .hero-section {
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .main-title {
        font-size: clamp(2rem, 7vw, 4rem);
        font-weight: 800;
        /* Cambiado a variable dinámica */
        color: var(--texto-principal) !important; 
        letter-spacing: -1px;
    }

    /* Usamos tu color Cian característico */
    .accent-text { color: var(--cian); }
    
    .mono { font-family: 'Fira Code', monospace; color: var(--texto-gris) !important; }

    /* 3. TARJETAS DINÁMICAS */
    .stat-card {
        background: var(--bg-tarjeta) !important;
        border-radius: 15px;
        padding: 25px;
        border: 1px solid var(--borde) !important;
        transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .stat-card:hover { 
        transform: translateY(-5px); 
        border-color: var(--cian) !important; 
    }

    .stat-number {
        color: var(--cian) !important;
        font-size: 2.5rem;
    }

    /* 4. BOTÓN ADAPTADO */
    .btn-trayectoria {
        background-color: var(--texto-principal) !important; /* Inverso al fondo */
        color: var(--bg-sitio) !important;
        border: none;
        padding: 12px 40px;
        font-weight: 700;
        transition: opacity 0.2s;
    }
    
    .btn-trayectoria:hover {
        opacity: 0.9;
        color: var(--cian) !important;
    }
</style>

<div class="hero-section animate-fade-in">
    <div class="mb-5">
        <h1 class="main-title mb-3">
            Construyendo el <span class="accent-text">Futuro</span> de la Tecnología.
        </h1>
        <p class="lead mono mb-0">
            Estudiante de TI @ ULEAM
        </p>
    </div>

    <div class="row g-4 w-100" style="max-width: 800px;">
        <div class="col-md-4">
            <div class="stat-card shadow-sm">
                <h3 class="fw-bold stat-number mb-1">2+</h3>
                <p class="small mb-0 fw-bold" style="color: var(--texto-gris)">Años de Estudio</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card shadow-sm">
                <h3 class="fw-bold stat-number mb-1">1</h3>
                <p class="small mb-0 fw-bold" style="color: var(--texto-gris)">Curso Realizado</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card shadow-sm">
                <h3 class="fw-bold stat-number mb-1">1</h3>
                <p class="small mb-0 fw-bold" style="color: var(--texto-gris)">Proyecto Tech</p>
            </div>
        </div>
    </div>

    <div class="mt-5">
        <a href="{% url 'experiencia' %}" class="btn btn-trayectoria btn-lg rounded-pill shadow-sm">
            Ver mi trayectoria <i class="bi bi-arrow-right ms-2"></i>
        </a>
    </div>
</div>
{% endblock %}
