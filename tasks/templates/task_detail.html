{% extends 'base.html' %}
{% block content %}
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 p-4 rounded-3" style="background: rgba(15,15,25,0.8); border: 1px solid var(--neon-cyan);">
            <h1 class="text-info mb-4">{{task.title|upper}}</h1>
            <form method="POST">
                {% csrf_token %}
                {{form.as_p}}
                <button class="btn btn-info w-100 mt-3">UPDATE_RECORD</button>
            </form>
            <div class="d-flex gap-2 mt-4">
                <form action="{% url 'complete_task' task.id %}" method="POST" class="flex-grow-1">
                    {% csrf_token %}<button class="btn btn-success w-100">COMPLETE</button>
                </form>
                <form action="{% url 'delete_task' task.id %}" method="POST" class="flex-grow-1">
                    {% csrf_token %}<button class="btn btn-outline-danger w-100">DELETE</button>
                </form>
            </div>
        </div>
    </div>
</main>
{% endblock %}
