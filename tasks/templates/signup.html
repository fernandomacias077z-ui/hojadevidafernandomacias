{% extends 'base.html' %}
{% block content %}
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="p-4 rounded-3 shadow" style="background: var(--glass); border: 1px solid var(--neon-purple);">
                <h1 class="text-center mb-4" style="font-family: 'Fira Code'; color: var(--neon-purple);">NEW_USER_CREATE</h1>
                {% if error %}<div class="alert alert-danger py-2" style="font-size: 0.8rem;">{{error}}</div>{% endif %}
                <form action="/signup/" method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small text-info">USERNAME_TAG</label>
                        <input type="text" name="username" class="form-control bg-dark text-white border-secondary" placeholder="Write username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-info">PASSWORD_ENCRYPT</label>
                        <input type="password" name="password1" class="form-control bg-dark text-white border-secondary" placeholder="••••••••">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-info">CONFIRM_VERIFICATION</label>
                        <input type="password" name="password2" class="form-control bg-dark text-white border-secondary" placeholder="••••••••">
                    </div>
                    <button class="btn btn-primary w-100 py-2 fw-bold" style="background: var(--neon-purple); border: none;">INITIALIZE_SIGNUP</button>
                </form>
            </div>
        </div>
    </div>
</main>
{% endblock %}
