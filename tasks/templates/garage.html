<div class="row g-4">
    {% for p in proyectos %}
    <div class="col-md-4">
        <div class="card h-100 bg-dark text-white border-info card-animada">
            <div class="overflow-hidden">
                {% if p.imagen %}
                    <img src="{{ p.imagen.url }}" class="card-img-top img-zoom" alt="{{ p.nombre }}">
                {% endif %}
            </div>
            <div class="card-body">
                <h5 class="card-title fw-bold">{{ p.nombre }}</h5>
                <p class="text-info fs-4 fw-bold">${{ p.precio }}</p>
                <p class="card-text small text-secondary">{{ p.descripcion }}</p>
            </div>
            <div class="card-footer border-info bg-transparent">
                <small class="text-info">{{ p.tecnologias }}</small>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<style>
    .card-animada { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .card-animada:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0, 202, 227, 0.3); }
    .img-zoom { transition: transform 0.5s ease; height: 200px; object-fit: cover; }
    .card-animada:hover .img-zoom { transform: scale(1.1); }
</style>
