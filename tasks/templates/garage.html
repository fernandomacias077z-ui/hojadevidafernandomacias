{% extends 'base.html' %}

{% block content %}
<div class="container-fluid animate__animated animate__fadeIn">
    <h2 class="mono fw-bold mb-4" style="color: var(--dev-blue);">
        <i class="bi bi-gpu-card"></i> GARAGE_TECH_EXPLORER
    </h2>
    
    <div class="row g-4">
        {% for p in proyectos %}
        <div class="col-md-6 col-xl-4">
            <div class="card h-100 border-0 shadow-sm card-animada">
                <div class="overflow-hidden position-relative" style="border-radius: 12px 12px 0 0;">
                    {% if p.imagen %}
                        <img src="{{ p.imagen.url }}" class="card-img-top img-zoom" alt="{{ p.nombre }}">
                    {% else %}
                        <div class="bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                            <i class="bi bi-box-seam text-secondary fs-1"></i>
                        </div>
                    {% endif %}
                </div>
                
                <div class="card-body">
                    <h5 class="fw-bold mb-1">{{ p.nombre }}</h5>
                    <div class="text-info mono fw-bold mb-3 fs-4">${{ p.precio }}</div>
                    <p class="text-secondary small">{{ p.descripcion }}</p>
                </div>
                
                <div class="card-footer bg-transparent border-0 d-flex justify-content-between align-items-center pb-3">
                    <span class="badge bg-light text-dark mono small border">{{ p.tecnologias }}</span>
                    <a href="https://wa.me/593980643265?text=Interés en: {{ p.nombre }}" 
                       class="btn btn-sm btn-outline-primary rounded-pill px-3">
                        <i class="bi bi-whatsapp"></i> Consultar
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    /* Estilos que complementan tu base.html */
    .card-animada {
        transition: var(--transition-smooth);
        border-radius: 15px;
    }
    .card-animada:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 24px rgba(56, 189, 248, 0.2) !important;
    }
    .img-zoom {
        transition: transform 0.5s ease;
        height: 200px;
        object-fit: cover;
    }
    .card-animada:hover .img-zoom {
        transform: scale(1.08);
    }
    /* Soporte para modo oscuro en el badge del footer */
    body.dark-mode .badge.bg-light {
        background-color: #334155 !important;
        color: #38bdf8 !important;
        border-color: #475569 !important;
    }
</style>
{% endblock %}
