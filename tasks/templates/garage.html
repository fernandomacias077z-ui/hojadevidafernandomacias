<div class="container py-5">
    <h2 class="text-white fw-bold mb-4">Garage <span class="text-info">Tech</span></h2>
    <div class="row g-4">
        {% for p in proyectos %}
        <div class="col-md-4">
            <div class="card h-100 bg-dark text-white border-info card-animada">
                <div class="overflow-hidden position-relative">
                    {% if p.imagen %}
                        <img src="{{ p.imagen.url }}" class="card-img-top img-zoom" alt="{{ p.nombre }}">
                    {% else %}
                        <div class="bg-secondary d-flex align-items-center justify-content-center" style="height: 200px;">
                            <i class="bi bi-image text-dark fs-1"></i>
                        </div>
                    {% endif %}
                    <span class="badge bg-info text-dark position-absolute top-0 end-0 m-2">Disponible</span>
                </div>
                <div class="card-body">
                    <h5 class="card-title fw-bold">{{ p.nombre }}</h5>
                    <p class="text-info fs-4 fw-bold mb-2">${{ p.precio }}</p>
                    <p class="card-text small text-secondary">{{ p.descripcion }}</p>
                </div>
                <div class="card-footer border-info bg-transparent d-flex justify-content-between align-items-center">
                    <small class="text-info">{{ p.tecnologias }}</small>
                    <a href="https://wa.me/593980643265?text=Hola, me interesa el {{ p.nombre }}" class="btn btn-sm btn-outline-info">Consultar</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    /* Animación de la tarjeta al pasar el mouse */
    .card-animada { 
        transition: transform 0.3s ease, box-shadow 0.3s ease; 
        cursor: pointer;
    }
    .card-animada:hover { 
        transform: translateY(-10px); 
        box-shadow: 0 10px 25px rgba(0, 202, 227, 0.4); 
    }
    /* Efecto de zoom suave en la imagen */
    .img-zoom { 
        transition: transform 0.6s ease; 
        height: 220px; 
        object-fit: cover; 
    }
    .card-animada:hover .img-zoom { 
        transform: scale(1.1); 
    }
</style>
