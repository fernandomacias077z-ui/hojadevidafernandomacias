<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue-tech: #2563eb; --green-success: #10b981; }
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        #loader { position: fixed; inset: 0; background: #0f172a; z-index: 99; display: flex; align-items: center; justify-content: center; }
        .code-anim { animation: pulse 1.5s infinite; color: var(--blue-tech); font-size: 3rem; font-weight: bold; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="loader"><div class="code-anim">{ }</div></div>
    <nav class="glass sticky top-0 z-40 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-500">DEV_HUB <span class="text-white">//</span></a>
            <div>
                {% if user.is_authenticated %}
                <a href="{% url 'profile_cv' %}" class="px-4">_CV</a>
                <a href="{% url 'logout' %}" class="bg-red-500/20 text-red-400 px-4 py-2 rounded">LOGOUT</a>
                {% else %}
                <a href="{% url 'signin' %}" class="px-4">_LOGIN</a>
                <a href="{% url 'signup' %}" class="bg-blue-600 px-4 py-2 rounded shadow-lg shadow-blue-500/20">_SIGNUP</a>
                {% endif %}
            </div>
        </div>
    </nav>
    {% block content %}{% endblock %}
    <script>
        window.addEventListener('load', () => { document.getElementById('loader').style.display = 'none'; });
    </script>
</body>
</html>
