<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Macias | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --dev-blue: #38bdf8;
            --dark-dev: #0f172a;
            --bg-sidebar: #ffffff;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- CONFIGURACIÓN GLOBAL MODO OSCURO --- */
        body.dark-mode {
            background-color: #0f172a !important;
            color: #f8fafc !important;
        }

        /* Corrección de letras que no se veían (Letras Negras -> Blancas) */
        body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, 
        body.dark-mode h4, body.dark-mode h5, body.dark-mode h6,
        body.dark-mode p, body.dark-mode span, body.dark-mode label,
        body.dark-mode strong, body.dark-mode .profile-name,
        body.dark-mode .text-dark, body.dark-mode .fw-bold {
            color: #f1f5f9 !important;
        }

        body.dark-mode .text-secondary, body.dark-mode .text-muted {
            color: #94a3b8 !important;
        }

        /* Sidebar y Cards en Modo Oscuro */
        body.dark-mode .sidebar {
            background: #1e293b !important;
            border-right-color: #334155 !important;
        }

        body.dark-mode .profile-card, body.dark-mode .card {
            background-color: #1e293b !important;
            border-color: #334155 !important;
        }

        body.dark-mode .nav-link-custom {
            color: #cbd5e1 !important;
        }

        body.dark-mode .nav-link-custom:hover {
            background: #334155 !important;
            color: var(--dev-blue) !important;
        }

        body.dark-mode .bg-light {
            background-color: #0f172a !important;
            color: white !important;
            border: 1px solid #334155 !important;
        }

        body.dark-mode .modal-content {
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
        }

        /* --- ESTILOS BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            color: #1e293b;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Layout Fijo */
        .wrapper { display: flex; flex-direction: column; min-height: 100vh; }

        @media (min-width: 992px) {
            .wrapper { flex-direction: row; }
            .sidebar { 
                width: 320px; height: 100vh; position: fixed; 
                top: 0; left: 0; border-right: 1px solid #e2e8f0; 
                overflow-y: auto; z-index: 1000;
                transition: var(--transition-smooth);
            }
            .main-content { flex: 1; margin-left: 320px; padding: 50px; }
        }

        .sidebar { background: var(--bg-sidebar); padding: 30px 25px; display: flex; flex-direction: column; }
        .profile-box { text-align: center; margin-bottom: 30px; }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--dark-dev); object-fit: cover; transition: var(--transition-smooth); }
        .profile-name { font-weight: 800; font-size: 1.1rem; color: var(--dark-dev); margin-top: 15px; letter-spacing: -0.5px; line-height: 1.2; }

        /* Navegación */
        .nav-link-custom {
            display: flex; align-items: center; padding: 12px 15px;
            color: #475569; text-decoration: none; font-weight: 600;
            border-radius: 12px; margin-bottom: 8px; transition: var(--transition-smooth);
        }
        .nav-link-custom:hover { background: #f0f9ff; color: var(--dev-blue); transform: translateX(5px); }
        .nav-link-custom i { font-size: 1.3rem; margin-right: 15px; color: var(--dev-blue); }

        .btn-garage {
            border: 2px dashed var(--dev-blue); border-radius: 25px;
            color: var(--dev-blue); padding: 12px; text-decoration: none; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin: 20px 0; font-family: 'Fira Code', monospace; transition: var(--transition-smooth);
        }

        /* Botón Modo Oscuro */
        .dark-mode-btn {
            cursor: pointer; border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 12px; display: flex; align-items: center; justify-content: center;
            gap: 10px; font-size: 0.9rem; font-weight: 700; transition: all 0.3s ease;
            background: transparent; color: #64748b; margin-top: auto;
        }
        body.dark-mode .dark-mode-btn { border-color: #334155; color: #f8fafc; }

        .hidden-section { display: none !important; }
        .mono { font-family: 'Fira Code', monospace; }

        @media print {
            .sidebar, .d-print-none, .dark-mode-btn { display: none !important; }
            .main-content { padding: 0 !important; margin-left: 0 !important; width: 100% !important; }
            body.dark-mode { background: white !important; color: black !important; }
            body.dark-mode * { color: black !important; }
        }
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">

    <div class="wrapper">
        <aside class="sidebar animate-fade-in">
            <div class="profile-box">
                <img src="https://i.postimg.cc/L41m7wwd/perfil.jpg" class="profile-img" alt="Bruno Macias">
                <div class="profile-name">BRUNO FERNANDO<br>MACIAS MOREIRA</div>
            </div>

            <nav class="nav-list">
                <a href="{% url 'home' %}" class="nav-link-custom"><i class="bi bi-terminal-fill"></i> Inicio</a>
                <a href="{% url 'perfil' %}" class="nav-link-custom" id="nav-perfil"><i class="bi bi-person-badge-fill"></i> Mi Perfil</a>
                <a href="{% url 'experiencia' %}" class="nav-link-custom" id="nav-exp"><i class="bi bi-layers-half"></i> Experiencia</a>
                <a href="{% url 'cursos' %}" class="nav-link-custom" id="nav-cur"><i class="bi bi-patch-check-fill"></i> Cursos</a>
                <a href="{% url 'reconocimientos' %}" class="nav-link-custom" id="nav-rec"><i class="bi bi-award-fill"></i> Reconocimientos</a>
            </nav>

            <a href="{% url 'garage' %}" class="btn-garage" id="nav-gar"><i class="bi bi-gpu-card"></i> Garage Tech</a>

            <button id="theme-toggle" class="dark-mode-btn d-print-none">
                <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                <span id="theme-text">MODO OSCURO</span>
            </button>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');
        const body = document.body;

        // Cargar preferencia guardada
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            updateToggleUI(true);
        }

        themeToggle.addEventListener('click', () => {
            const isDark = body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateToggleUI(isDark);
        });

        function updateToggleUI(isDark) {
            themeIcon.className = isDark ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
            themeText.innerText = isDark ? 'MODO CLARO' : 'MODO OSCURO';
            themeIcon.style.color = isDark ? '#fbbf24' : '#38bdf8';
        }

        // Visibilidad de secciones
        document.addEventListener("DOMContentLoaded", function() {
            const configs = [
                { sw: 'switch-perfil', el: 'nav-perfil' },
                { sw: 'switch-exp', el: 'nav-exp' },
                { sw: 'switch-cur', el: 'nav-cur' },
                { sw: 'switch-rec', el: 'nav-rec' },
                { sw: 'switch-gar', el: 'nav-gar' }
            ];
            configs.forEach(item => {
                const checkbox = document.getElementById(item.sw);
                const element = document.getElementById(item.el);
                if (checkbox && element) {
                    const isVisible = localStorage.getItem(item.sw) !== 'false';
                    checkbox.checked = isVisible;
                    if (!isVisible) element.classList.add('hidden-section');
                    checkbox.addEventListener('change', function() {
                        element.classList.toggle('hidden-section', !this.checked);
                        localStorage.setItem(item.sw, this.checked);
                    });
                }
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
