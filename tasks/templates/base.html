<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fernando Macias | Dev Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --dark: #0f172a; --card-bg: #1e293b; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark); color: white; overflow-x: hidden; }
        .navbar { background: rgba(15, 23, 42, 0.9) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-link { color: white !important; font-weight: 500; }
        .nav-link:hover { color: var(--primary) !important; }
        .btn-custom { background: linear-gradient(45deg, var(--secondary), var(--primary)); border: none; color: white; font-weight: 600; transition: 0.3s; }
        .btn-custom:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,242,254,0.3); color: white; }
        .card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="/">/ DEV_HUB //</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">INICIO</a>
                {% if user.is_authenticated %}
                    <a class="nav-link" href="{% url 'tasks' %}">MIS TAREAS</a>
                    <a class="nav-link btn btn-outline-danger ms-lg-3" href="{% url 'logout' %}">LOGOUT</a>
                {% else %}
                    <a class="nav-link" href="{% url 'signin' %}">LOGIN</a>
                    <a class="nav-link btn btn-custom ms-lg-3" href="{% url 'signup' %}">SIGNUP</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="text-center py-4 mt-5 border-top border-secondary">
        <p class="text-secondary">© 2026 Fernando Macias // Bachiller en Informática - U.E.F. "Manta"</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
