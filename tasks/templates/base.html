<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Macias | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --dev-blue: #38bdf8;
            --dark-dev: #0f172a;
            --bg-sidebar: #ffffff;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            color: #1e293b;
        }

        /* Animaciones */
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInSlide 0.6s ease-out forwards; }

        /* Layout */
        .wrapper { display: flex; flex-direction: column; min-height: 100vh; }

        @media (min-width: 992px) {
            .wrapper { flex-direction: row; }
            .sidebar { width: 320px; height: 100vh; position: sticky; top: 0; border-right: 1px solid #e2e8f0; }
            .main-content { flex: 1; padding: 50px; }
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-sidebar);
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .profile-box { text-align: center; margin-bottom: 30px; }
        .profile-img {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 4px solid var(--dark-dev);
            object-fit: cover;
            transition: var(--transition-smooth);
        }
        .profile-img:hover { transform: scale(1.05); border-color: var(--dev-blue); }
        
        .profile-name { 
            font-weight: 800; font-size: 1.1rem; color: var(--dark-dev); 
            margin-top: 15px; letter-spacing: -0.5px; line-height: 1.2;
        }

        /* Navegación */
        .nav-list { list-style: none; padding: 0; }
        .nav-link-custom {
            display: flex; align-items: center; padding: 12px 15px;
            color: #475569; text-decoration: none; font-weight: 600;
            border-radius: 12px; margin-bottom: 8px; transition: var(--transition-smooth);
        }
        .nav-link-custom:hover { background: #f0f9ff; color: var(--dev-blue); transform: translateX(5px); }
        .nav-link-custom i { font-size: 1.3rem; margin-right: 15px; color: var(--dev-blue); }

        /* Botón Garage Especial */
        .btn-garage {
            border: 2px dashed var(--dev-blue); border-radius: 25px;
            color: var(--dev-blue); padding: 12px; text-decoration: none; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin: 20px 0; font-family: 'Fira Code', monospace; transition: var(--transition-smooth);
        }
        .btn-garage:hover { background: var(--dev-blue); color: white; border-style: solid; }

        /* Clases de utilidad para JS */
        .hidden-section { display: none !important; }
        .show-section { display: flex !important; animation: fadeInSlide 0.4s ease forwards; }
        .mono { font-family: 'Fira Code', monospace; }

        /* Estilos para impresión */
        @media print {
            .sidebar, .d-print-none { display: none !important; }
            .main-content { padding: 0 !important; width: 100% !important; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <aside class="sidebar animate-fade-in">
            <div class="profile-box">
                <img src="https://i.postimg.cc/L41m7wwd/perfil.jpg" class="profile-img" alt="Bruno Macias">
                <div class="profile-name">BRUNO FERNANDO<br>MACIAS MOREIRA</div>
            </div>

            <nav class="nav-list">
                <a href="{% url 'home' %}" class="nav-link-custom">
                    <i class="bi bi-terminal-fill"></i> Inicio
                </a>
                
                <a href="{% url 'perfil' %}" class="nav-link-custom" id="nav-perfil">
                    <i class="bi bi-person-badge-fill"></i> Mi Perfil
                </a>

                <a href="{% url 'experiencia' %}" class="nav-link-custom" id="nav-exp">
                    <i class="bi bi-layers-half"></i> Experiencia
                </a>

                <a href="{% url 'cursos' %}" class="nav-link-custom" id="nav-cur">
                    <i class="bi bi-patch-check-fill"></i> Cursos
                </a>

                <a href="{% url 'reconocimientos' %}" class="nav-link-custom" id="nav-rec">
                    <i class="bi bi-award-fill"></i> Reconocimientos
                </a>

                <a href="{% url 'productos_academicos' %}" class="nav-link-custom" id="nav-prod">
                    <i class="bi bi-cpu-fill"></i> P. Académicos
                </a>
            </nav>

            <a href="{% url 'garage' %}" class="btn-garage" id="nav-gar">
                <i class="bi bi-gpu-card"></i> Garage Tech
            </a>
            
            </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div class="modal fade" id="configModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg animate__animated animate__zoomIn animate__faster">
                <div class="modal-body p-4">
                    <h4 class="mb-4 text-center fw-bold" style="color:var(--dark-dev);">Visibilidad de Secciones</h4>
                    
                    <div class="form-check form-switch d-flex justify-content-between align-items-center mb-3 px-4 py-2 bg-light rounded-3">
                        <label class="form-check-label fw-bold" for="switch-perfil">Mi Perfil</label>
                        <input class="form-check-input" type="checkbox" checked id="switch-perfil">
                    </div>
                    <div class="form-check form-switch d-flex justify-content-between align-items-center mb-3 px-4 py-2 bg-light rounded-3">
                        <label class="form-check-label fw-bold" for="switch-exp">Experiencia</label>
                        <input class="form-check-input" type="checkbox" checked id="switch-exp">
                    </div>
                    <div class="form-check form-switch d-flex justify-content-between align-items-center mb-3 px-4 py-2 bg-light rounded-3">
                        <label class="form-check-label fw-bold" for="switch-cur">Cursos</label>
                        <input class="form-check-input" type="checkbox" checked id="switch-cur">
                    </div>
                    <div class="form-check form-switch d-flex justify-content-between align-items-center mb-3 px-4 py-2 bg-light rounded-3">
                        <label class="form-check-label fw-bold" for="switch-rec">Reconocimientos</label>
                        <input class="form-check-input" type="checkbox" checked id="switch-rec">
                    </div>
                    <div class="form-check form-switch d-flex justify-content-between align-items-center mb-4 px-4 py-2 bg-light rounded-3">
                        <label class="form-check-label fw-bold" for="switch-gar">Garage Tech</label>
                        <input class="form-check-input" type="checkbox" checked id="switch-gar">
                    </div>

                    <button type="button" class="btn btn-dark w-100 py-2 fw-bold" style="border-radius: 15px;" data-bs-dismiss="modal">Guardar Preferencias</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const configs = [
                { sw: 'switch-perfil', el: 'nav-perfil' },
                { sw: 'switch-exp', el: 'nav-exp' },
                { sw: 'switch-cur', el: 'nav-cur' },
                { sw: 'switch-rec', el: 'nav-rec' },
                { sw: 'switch-gar', el: 'nav-gar' }
            ];

            configs.forEach(item => {
                const checkbox = document.getElementById(item.sw);
                const element = document.getElementById(item.el);

                if (checkbox && element) {
                    // Cargar estado
                    const isVisible = localStorage.getItem(item.sw) !== 'false';
                    checkbox.checked = isVisible;
                    if (!isVisible) element.classList.add('hidden-section');

                    // Guardar cambios
                    checkbox.addEventListener('change', function() {
                        if (this.checked) {
                            element.classList.remove('hidden-section');
                            element.classList.add('show-section');
                            localStorage.setItem(item.sw, 'true');
                        } else {
                            element.classList.add('hidden-section');
                            element.classList.remove('show-section');
                            localStorage.setItem(item.sw, 'false');
                        }
                    });
                }
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
