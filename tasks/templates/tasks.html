{% extends 'base.html' %}
{% block content %}
<main class="container">
    <h1 class="text-center display-4 text-info my-5 font-monospace">{{tipopagina|upper}}</h1>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="list-group gap-3">
                {% for task in tasks %}
                    <a href="{% url 'task_detail' task.id %}" class="list-group-item list-group-item-action p-4 rounded-3" style="background: #0a0a12; border: 1px solid #1a1a24; color: #fff;">
                        <div class="d-flex justify-content-between">
                            <h4 class="{% if task.important %}text-success fw-bold{% endif %}">{{task.title}}</h4>
                            <span class="badge bg-dark border border-info text-info">ID: #{{task.id}}</span>
                        </div>
                        <p class="text-secondary small mt-2">{{task.description|truncatechars:100}}</p>
                    </a>
                {% empty %}
                    <div class="text-center py-5 border border-secondary rounded-3">
                        <p class="text-secondary font-monospace">_NO_TASKS_FOUND // DATABASE_EMPTY</p>
                        <a href="{% url 'create_task' %}" class="btn btn-outline-info btn-sm">CREATE_FIRST_TASK</a>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</main>
{% endblock %}
